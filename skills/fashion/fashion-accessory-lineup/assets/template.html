<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>[REPLACE Category] [REPLACE Segment] · [REPLACE Season]</title>
<style>
  @import url("https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css");
  @import url("https://fonts.googleapis.com/css2?family=Bagel+Fat+One&family=Black+Han+Sans&family=Diphylleia&family=Grandiflora+One&family=Hahmlet:wght@400;500;600;700&display=swap");
  :root {
    --ink:        #1f2933;
    --paper:      #fafaf7;
    --rule:       #e7e3da;
    --muted:      #6b7280;
    --accent:     #b8443a;
    --hero-bg:    rgba(184,68,58,0.06);

    --font-sans: "Pretendard Variable", Pretendard, -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Noto Sans KR", "Segoe UI", system-ui, sans-serif;

    --font-display-report: "Paperlogy", "Wanted Sans Variable", "SUIT Variable", "Pretendard Variable", Pretendard, system-ui, sans-serif;

    --font-display-street: "Black Han Sans", "Gmarket Sans", "Pretendard Variable", Pretendard, sans-serif;

    --font-display-play: "Bagel Fat One", "Gmarket Sans", "Pretendard Variable", Pretendard, sans-serif;

    --font-display-romance: "Grandiflora One", "Diphylleia", "Hahmlet", "Noto Serif KR", "Source Serif 4", ui-serif, Georgia, serif;

    --font-display: var(--font-display-report);
    --font-text: var(--font-sans);
    --font-mono: "JetBrains Mono", "IBM Plex Mono", ui-monospace, "SF Mono", Menlo, monospace;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--paper); color: var(--ink); font-family: var(--font-text); }
  body { padding: 40px 40px 64px; }

  .al-header { padding-bottom: 16px; margin-bottom: 24px; border-bottom: 1px solid var(--rule); }
  .al-meta { display: flex; gap: 16px; font-family: var(--font-mono); font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; }
  .al-meta .date { margin-left: auto; }
  .title { font-family: var(--font-display); font-size: 28px; margin: 12px 0 8px; }
  .thesis { font-size: 13px; line-height: 1.55; color: #374151; max-width: 80ch; margin: 0; }

  /* Family columns (rhythm A) */
  .family-columns { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 24px; margin-bottom: 32px; }
  .family-columns--compact { grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; }
  .family-col { padding: 14px; background: rgba(255,255,255,0.5); border: 1px solid var(--rule); border-radius: 8px; display: flex; flex-direction: column; gap: 12px; }
  .family-header { padding-bottom: 10px; border-bottom: 1px solid var(--rule); }
  .family-tag { display: block; font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); margin-bottom: 4px; }
  .family-name { font-family: var(--font-display); font-size: 16px; margin: 0; letter-spacing: 0.04em; }
  .family-note { font-size: 11px; line-height: 1.4; color: var(--muted); margin: 4px 0 0; }

  .sku-stack { display: flex; flex-direction: column; gap: 12px; }
  .sku-card { margin: 0; display: flex; flex-direction: column; gap: 6px; }
  .sku-card .image-frame { aspect-ratio: 1/1; background: #efeae0; border-radius: 4px; overflow: hidden; display: flex; align-items: center; justify-content: center; }
  .sku-card .image-frame img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .sku-card figcaption { font-size: 11px; line-height: 1.4; color: var(--ink); }
  .sku-card figcaption strong { font-family: var(--font-display); font-weight: 600; }

  /* Family stack (rhythm B) */
  .family-stack { display: flex; flex-direction: column; gap: 24px; margin-bottom: 32px; }
  .family-block { padding: 16px; background: rgba(255,255,255,0.5); border: 1px solid var(--rule); border-radius: 8px; }
  .sku-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; }
  .sku-card--row .image-frame { aspect-ratio: 1/1; }

  /* Hero (rhythm C) */
  .al-hero { display: grid; grid-template-columns: 2fr 3fr; gap: 24px; padding: 16px; background: var(--hero-bg); border-radius: 12px; margin-bottom: 32px; }
  .hero-frame { aspect-ratio: 1/1; background: #efeae0; border-radius: 8px; overflow: hidden; }
  .hero-frame img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .hero-meta { display: flex; flex-direction: column; gap: 8px; }
  .hero-flag { display: inline-block; align-self: flex-start; font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: #fff; background: var(--accent); padding: 4px 10px; border-radius: 999px; }
  .hero-meta h2 { font-family: var(--font-display); font-size: 22px; margin: 0; }
  .hero-meta p { font-size: 13px; line-height: 1.5; color: #374151; margin: 0; }
  .hero-sku-strip { display: grid; grid-template-columns: repeat(auto-fit, minmax(100px, 1fr)); gap: 8px; margin-top: 12px; }
  .sku-card--small .image-frame { aspect-ratio: 1/1; }
  .sku-card--small figcaption { font-size: 10px; }

  /* Accent strip */
  .accent-strip { padding: 16px; background: rgba(0,0,0,0.03); border-radius: 8px; margin-bottom: 24px; }
  .accent-strip h2 { font-family: var(--font-display); font-size: 14px; margin: 0 0 4px; letter-spacing: 0.06em; text-transform: uppercase; }
  .accent-note { font-size: 12px; color: var(--muted); margin: 0 0 12px; }
  .accent-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 10px; }
  .accent-row figure { margin: 0; display: flex; flex-direction: column; gap: 4px; }
  .accent-row .image-frame { aspect-ratio: 1/1; background: #efeae0; border-radius: 4px; overflow: hidden; }
  .accent-row .image-frame img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .accent-row figcaption { font-family: var(--font-mono); font-size: 10px; color: var(--muted); text-align: center; text-transform: uppercase; letter-spacing: 0.06em; }

  /* Fallback */
  .image-frame[data-fallback]:not(:has(img[src]:not([src=""])))::after { content: attr(data-fallback); display: block; padding: 6px; font-size: 9px; line-height: 1.3; color: var(--muted); font-family: var(--font-mono); text-align: center; }

  /* Tail blocks */
  .sku-table, .open-decisions { margin-top: 32px; padding-top: 20px; border-top: 1px solid var(--rule); }
  .sku-table h2, .open-decisions h2 { font-family: var(--font-display); font-size: 14px; margin: 0 0 12px; letter-spacing: 0.08em; text-transform: uppercase; }
  table { border-collapse: collapse; font-size: 12px; }
  th, td { padding: 6px 12px; text-align: left; border-bottom: 1px solid var(--rule); }
  th { font-family: var(--font-mono); font-size: 11px; text-transform: uppercase; color: var(--muted); }
  tr.total td { font-weight: 600; border-bottom: none; }
  ul { margin: 0; padding-left: 18px; font-size: 13px; line-height: 1.6; }

  @media (max-width: 900px) {
    .al-hero { grid-template-columns: 1fr; }
  }
  @media print { body { padding: 16px; } .family-col, .sku-card { break-inside: avoid; } }
</style>
</head>
<body>
  <main id="accessory-lineup">
    <!-- PASTE one rhythm + (optional accent strip) + tail blocks. -->
  </main>
</body>
</html>
