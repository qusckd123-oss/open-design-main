<!doctype html>
<!--
  fashion-season-deck template
  Copy to <project>/index.html, replace [REPLACE] tokens, bind active
  DESIGN.md tokens into :root, and assemble slides per
  references/slide-order.md and references/layouts.md.
-->
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>[REPLACE Season] [REPLACE Brand] · Design Plan Deck</title>
<style>
  @import url("https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css");
  @import url("https://fonts.googleapis.com/css2?family=Bagel+Fat+One&family=Black+Han+Sans&family=Diphylleia&family=Grandiflora+One&family=Hahmlet:wght@400;500;600;700&display=swap");
  :root {
    --ink:        #1f2933;
    --paper:      #fafaf7;
    --rule:       #e7e3da;
    --muted:      #6b7280;
    --accent:     #b8443a;
    --cover-bg:   #2c4248;     /* WACKYWILLY-style deep teal default */
    --cover-fg:   #ffffff;
    --divider-bg: #2c4248;
    --divider-fg: #ffffff;

    --font-sans: "Pretendard Variable", Pretendard, -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Noto Sans KR", "Segoe UI", system-ui, sans-serif;

    --font-display-report: "Paperlogy", "Wanted Sans Variable", "SUIT Variable", "Pretendard Variable", Pretendard, system-ui, sans-serif;

    --font-display-street: "Black Han Sans", "Gmarket Sans", "Pretendard Variable", Pretendard, sans-serif;

    --font-display-play: "Bagel Fat One", "Gmarket Sans", "Pretendard Variable", Pretendard, sans-serif;

    --font-display-romance: "Grandiflora One", "Diphylleia", "Hahmlet", "Noto Serif KR", "Source Serif 4", ui-serif, Georgia, serif;

    --font-display: var(--font-display-report);
    --font-text: var(--font-sans);
    --font-mono: "JetBrains Mono", "IBM Plex Mono", ui-monospace, "SF Mono", Menlo, monospace;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--paper); color: var(--ink); font-family: var(--font-text); }

  /* Deck container */
  .deck { display: block; }
  .deck--scroll-vertical { scroll-snap-type: y mandatory; overflow-y: scroll; height: 100vh; }
  .deck--scroll-horizontal { display: flex; flex-direction: row; scroll-snap-type: x mandatory; overflow-x: auto; overflow-y: hidden; height: 100vh; }
  .deck--scroll-horizontal .slide { flex: 0 0 100vw; height: 100vh; scroll-snap-align: start; }
  .deck--scroll-vertical .slide { scroll-snap-align: start; min-height: 100vh; }
  .deck--print .slide { width: 297mm; height: 210mm; }

  /* Slide base */
  .slide { position: relative; padding: 56px; display: flex; flex-direction: column; gap: 16px; background: var(--paper); }
  .slide-header { display: flex; gap: 16px; align-items: baseline; padding-bottom: 8px; border-bottom: 1px solid var(--rule); }
  .slide-num { font-family: var(--font-mono); font-size: 11px; color: var(--muted); }
  .slide-header h2 { font-family: var(--font-display); font-size: 22px; margin: 0; }
  .slide-body { flex: 1; min-height: 0; overflow: auto; }
  .slide-footer { display: flex; justify-content: space-between; align-items: baseline; padding-top: 8px; border-top: 1px solid var(--rule); font-family: var(--font-mono); font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; }
  .slide-attribution code { font-family: var(--font-mono); background: rgba(0,0,0,0.05); padding: 2px 6px; border-radius: 3px; color: var(--accent); }
  .page-num { font-variant-numeric: tabular-nums; }

  /* Cover */
  .slide--cover { background: var(--cover-bg); color: var(--cover-fg); padding: 80px; }
  .slide--cover .cover-header { margin-top: auto; display: flex; align-items: center; gap: 24px; padding-bottom: 12px; border-bottom: 1px solid rgba(255,255,255,0.4); }
  .slide--cover .brand-mark { font-family: var(--font-display); font-size: 32px; font-weight: 700; }
  .slide--cover h1 { font-family: var(--font-display); font-size: 48px; margin: 0; }
  .slide--cover footer { margin-bottom: 0; padding-top: 12px; }
  .slide--cover footer p { margin: 0; font-family: var(--font-mono); font-size: 14px; opacity: 0.85; letter-spacing: 0.06em; }

  /* TOC */
  .slide--toc { padding: 80px; }
  .slide--toc h2 { font-family: var(--font-display); font-size: 56px; margin: 0 0 32px; padding-bottom: 12px; border-bottom: 2px solid var(--ink); display: inline-block; }
  .toc-list { font-family: var(--font-display); font-size: 18px; line-height: 2; padding-left: 28px; margin: 0; counter-reset: toc; list-style: none; }
  .toc-list li { counter-increment: toc; }
  .toc-list li::before { content: counter(toc, decimal-leading-zero) "."; font-family: var(--font-mono); font-size: 14px; color: var(--muted); display: inline-block; width: 36px; }

  /* Divider */
  .slide--divider { background: var(--divider-bg); color: var(--divider-fg); padding: 80px; justify-content: center; }
  .slide--divider h2 { font-family: var(--font-display); font-size: 96px; margin: 0; line-height: 1; }
  .slide--divider::before { content: ""; width: 80px; height: 2px; background: var(--divider-fg); display: block; margin-bottom: 16px; }

  /* Embed slide — scope upstream module CSS to .slide[data-source="..."] */
  .slide--embed .slide-body { padding: 0; }
  .slide--embed .slide-body :is(h1, h2, h3) { /* let upstream styles win when scoped */ }

  /* Placeholder */
  .slide--placeholder { justify-content: center; align-items: center; text-align: center; background: rgba(0,0,0,0.03); border: 2px dashed var(--rule); }
  .slide--placeholder h2 { font-family: var(--font-display); font-size: 24px; margin: 0; }
  .slide--placeholder p { color: var(--muted); max-width: 60ch; margin: 0; }
  .slide--placeholder code { font-family: var(--font-mono); background: rgba(0,0,0,0.06); padding: 2px 8px; border-radius: 3px; }

  /* End */
  .slide--end { background: var(--cover-bg); color: var(--cover-fg); padding: 80px; align-items: flex-end; justify-content: center; text-align: right; }
  .slide--end h1 { font-family: var(--font-display); font-size: 96px; margin: 0; padding-bottom: 12px; border-bottom: 1px solid rgba(255,255,255,0.4); }
  .slide--end p { font-family: var(--font-display); font-size: 18px; margin: 12px 0 0; opacity: 0.9; }

  /* Inline (project-bound content) */
  .slide--inline { padding: 56px; }
  .slide--inline h2 { font-family: var(--font-display); font-size: 24px; margin: 0 0 16px; }

  /* Deck navigation */
  .deck-nav { position: fixed; bottom: 16px; right: 16px; z-index: 1000; display: flex; align-items: center; gap: 8px; padding: 6px 10px; background: rgba(0,0,0,0.65); color: #fff; border-radius: 999px; font-family: var(--font-mono); font-size: 12px; backdrop-filter: blur(8px); }
  .deck-nav button { background: transparent; color: inherit; border: 1px solid rgba(255,255,255,0.3); border-radius: 50%; width: 24px; height: 24px; cursor: pointer; font-size: 12px; line-height: 1; padding: 0; display: flex; align-items: center; justify-content: center; }
  .deck-nav button:hover { background: rgba(255,255,255,0.15); }
  .deck-counter { letter-spacing: 0.04em; min-width: 50px; text-align: center; }

  /* Print */
  @page { size: A4 landscape; margin: 0; }
  @media print {
    body { background: #fff; }
    .deck-nav { display: none; }
    .deck--scroll-vertical, .deck--scroll-horizontal { overflow: visible; height: auto; scroll-snap-type: none; }
    .slide { page-break-after: always; min-height: 0; height: 210mm; width: 297mm; }
    .slide--cover, .slide--divider, .slide--end { color-adjust: exact; -webkit-print-color-adjust: exact; }
  }
</style>
</head>
<body class="deck deck--scroll-vertical">
  <!--
    Assemble slides here per references/slide-order.md and references/layouts.md.
    Required: slide--cover (slide 1), slide--toc (slide 2), slide--end (last).
    Section dividers appear before their grouped slides.
  -->

  <nav class="deck-nav" aria-label="Deck navigation">
    <button data-cmd="prev" aria-label="Previous slide">↑</button>
    <span class="deck-counter"><span data-current>1</span> / <span data-total>—</span></span>
    <button data-cmd="next" aria-label="Next slide">↓</button>
  </nav>

  <script>
    // Minimal arrow-key + space + button navigation. Replace with project-bound
    // logic if a different rhythm (horizontal / paginated) is chosen.
    (function(){
      const slides = Array.from(document.querySelectorAll('.slide'));
      const total = slides.length;
      const counter = document.querySelector('[data-total]');
      const current = document.querySelector('[data-current]');
      if (counter) counter.textContent = total;
      let idx = 0;
      function show(n){ idx = Math.max(0, Math.min(total-1, n)); slides[idx].scrollIntoView({behavior:'smooth', block:'start'}); if (current) current.textContent = idx+1; }
      document.addEventListener('keydown', (e) => {
        if (['ArrowDown','ArrowRight',' '].includes(e.key)) { e.preventDefault(); show(idx+1); }
        if (['ArrowUp','ArrowLeft'].includes(e.key))        { e.preventDefault(); show(idx-1); }
      });
      const nav = document.querySelector('.deck-nav');
      if (nav) nav.addEventListener('click', (e) => {
        const t = e.target.closest('button'); if (!t) return;
        if (t.dataset.cmd === 'next') show(idx+1);
        if (t.dataset.cmd === 'prev') show(idx-1);
      });
      // Update counter as user scrolls
      const observer = new IntersectionObserver((entries) => {
        entries.forEach((entry) => {
          if (entry.isIntersecting && entry.intersectionRatio > 0.5) {
            const i = slides.indexOf(entry.target);
            if (i >= 0) { idx = i; if (current) current.textContent = i+1; }
          }
        });
      }, { threshold: [0.5] });
      slides.forEach(s => observer.observe(s));
    })();
  </script>
</body>
</html>
