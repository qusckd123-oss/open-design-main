<!doctype html>
<!--
  OD fashion-color-story seed.

  Copy this file to <project>/index.html. Optional imagegen mood thumbnails
  go under <project>/images/ — but most color stories ship without
  imagery (chips + codes are the deliverable).
-->
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>[REPLACE] Season Color Story</title>
  <style>
  @import url("https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css");
  @import url("https://fonts.googleapis.com/css2?family=Bagel+Fat+One&family=Black+Han+Sans&family=Diphylleia&family=Grandiflora+One&family=Hahmlet:wght@400;500;600;700&display=swap");
    :root {
      --bg: #efeae1;
      --paper: #faf6ee;
      --paper-deep: #e8e1d3;
      --ink: #161210;
      --ink-soft: #2c2520;
      --muted: #6e655a;
      --muted-soft: #94897b;
      --line: #d8cebf;
      --line-soft: #e6ddcd;
      --accent: #4a5d76;
      --accent-soft: color-mix(in oklch, var(--accent) 16%, transparent);
      --accent-loud: #b8754a;

      /* Tier color codes — used to color-band sections, NOT the palette swatches.
         These are framework chrome; the palette colors come from the inline
         styles in the master grid / detail spreads. */
      --tier-main: #4a5d76;
      --tier-season: #8a6f4a;
      --tier-accent: #b8754a;

      --shadow: rgba(28, 22, 16, 0.10);
      --shadow-deep: rgba(28, 22, 16, 0.18);
      --font-sans: "Pretendard Variable", Pretendard, -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Noto Sans KR", "Segoe UI", system-ui, sans-serif;
      --font-display-report: "Paperlogy", "Wanted Sans Variable", "SUIT Variable", "Pretendard Variable", Pretendard, system-ui, sans-serif;
      --font-display-street: "Black Han Sans", "Gmarket Sans", "Pretendard Variable", Pretendard, sans-serif;
      --font-display-play: "Bagel Fat One", "Gmarket Sans", "Pretendard Variable", Pretendard, sans-serif;
      --font-display-romance: "Grandiflora One", "Diphylleia", "Hahmlet", "Noto Serif KR", "Source Serif 4", ui-serif, Georgia, serif;
      --font-display: var(--font-display-romance);
      --font-body: var(--font-sans);
      --font-mono: "JetBrains Mono", "IBM Plex Mono", ui-monospace, "SF Mono", Menlo, monospace;
      --container: 1240px;
      --gutter: clamp(18px, 4vw, 48px);
      --radius: 6px;
    }

    *, *::before, *::after { box-sizing: border-box; }
    html { -webkit-text-size-adjust: 100%; }
    body {
      margin: 0;
      background: linear-gradient(180deg, var(--bg), color-mix(in oklch, var(--paper) 60%, var(--bg)));
      color: var(--ink);
      font-family: var(--font-body);
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }
    img, svg { display: block; max-width: 100%; }
    a { color: inherit; text-decoration: none; }
    p, h1, h2, h3 { margin: 0; text-wrap: pretty; }

    .page-shell {
      max-width: var(--container);
      margin-inline: auto;
      padding: clamp(28px, 5vw, 72px) var(--gutter);
    }
    .topline {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      padding-bottom: 14px;
      border-bottom: 1px solid var(--line);
      font-family: var(--font-mono);
      font-size: 11px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .topline-status { color: var(--accent-loud); }

    .section { padding: clamp(48px, 7vw, 96px) 0; border-bottom: 1px solid var(--line); }
    .section:last-child { border-bottom: 0; }

    .kicker {
      font-family: var(--font-mono);
      font-size: 11px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--accent-loud);
      margin-bottom: 14px;
    }
    .display {
      font-family: var(--font-display);
      font-size: clamp(52px, 9vw, 124px);
      line-height: 0.92;
      letter-spacing: -0.035em;
      font-weight: 400;
    }
    .h2 {
      font-family: var(--font-display);
      font-size: clamp(32px, 4.6vw, 58px);
      line-height: 1.02;
      letter-spacing: -0.022em;
      font-weight: 400;
    }
    .h3 {
      font-family: var(--font-display);
      font-size: 24px;
      line-height: 1.1;
      letter-spacing: -0.012em;
      font-weight: 400;
    }
    .lead {
      max-width: 680px;
      color: var(--muted);
      font-size: clamp(16px, 1.6vw, 20px);
      line-height: 1.5;
    }
    .meta {
      font-family: var(--font-mono);
      color: var(--muted);
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    /* ---- Cover -------------------------------------------------------- */
    .cover-grid {
      display: grid;
      grid-template-columns: minmax(0, 1.05fr) minmax(0, 0.95fr);
      gap: clamp(28px, 5vw, 72px);
      align-items: end;
    }
    .thesis {
      font-family: var(--font-display);
      font-size: clamp(22px, 2.2vw, 30px);
      line-height: 1.25;
      color: var(--ink-soft);
      max-width: 36ch;
      margin-top: 26px;
      letter-spacing: -0.01em;
    }
    .cover-meta {
      margin-top: 28px;
      display: inline-flex;
      gap: 14px;
      flex-wrap: wrap;
    }
    .palette-preview {
      margin: 0;
      display: grid;
      gap: 14px;
    }
    .preview-strip {
      display: grid;
      grid-template-columns: repeat(8, 1fr);
      gap: 6px;
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: 0 22px 50px var(--shadow);
    }
    .preview-chip {
      aspect-ratio: 1 / 1.25;
      display: block;
      border: 1px solid rgba(0, 0, 0, 0.08);
    }
    .preview-caption {
      text-align: right;
      letter-spacing: 0.10em;
    }

    /* ---- Thesis ------------------------------------------------------- */
    .thesis-block {
      display: grid;
      grid-template-columns: 0.85fr 1.15fr;
      gap: clamp(28px, 6vw, 86px);
      align-items: start;
    }
    .thesis-copy { display: grid; gap: 22px; max-width: 60ch; }
    .thesis-copy p { color: var(--muted); }
    .thesis-copy p.lead { color: var(--ink-soft); }

    /* ---- Master grid -------------------------------------------------- */
    .master-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 14px;
    }
    .master-chip {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--paper);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      box-shadow: 0 8px 22px var(--shadow);
    }
    .chip-swatch {
      height: 132px;
      border-bottom: 1px solid rgba(0, 0, 0, 0.08);
    }
    .chip-info {
      padding: 14px 16px 16px;
      display: grid;
      gap: 4px;
    }
    .chip-name {
      font-family: var(--font-display);
      font-size: 19px;
      letter-spacing: -0.01em;
      line-height: 1.1;
    }
    .chip-code {
      font-size: 10px;
      letter-spacing: 0.08em;
      color: var(--ink-soft);
    }
    .chip-tier {
      align-self: start;
      padding: 2px 7px;
      border-radius: 3px;
      border: 1px solid var(--line);
      font-size: 9px;
      letter-spacing: 0.14em;
      color: var(--muted);
    }
    .master-chip[data-tier="main"] .chip-tier { color: var(--tier-main); border-color: color-mix(in oklch, var(--tier-main) 35%, transparent); }
    .master-chip[data-tier="season"] .chip-tier { color: var(--tier-season); border-color: color-mix(in oklch, var(--tier-season) 35%, transparent); }
    .master-chip[data-tier="accent"] .chip-tier { color: var(--tier-accent); border-color: color-mix(in oklch, var(--tier-accent) 40%, transparent); }

    /* ---- Hierarchy + proportion bar ---------------------------------- */
    .proportion-bar {
      display: flex;
      width: 100%;
      height: 56px;
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: 0 6px 18px var(--shadow);
      border: 1px solid var(--line);
      margin-bottom: 36px;
    }
    .proportion-segment {
      flex: 0 0 var(--share, 33.33%);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      letter-spacing: 0.10em;
      font-family: var(--font-mono);
      font-size: 11px;
      text-transform: uppercase;
    }
    .proportion-segment[data-tier="main"] { background: var(--tier-main); }
    .proportion-segment[data-tier="season"] { background: var(--tier-season); }
    .proportion-segment[data-tier="accent"] { background: var(--tier-accent); }

    .tier-blocks {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 16px;
    }
    .tier-block {
      padding: 22px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: color-mix(in oklch, var(--paper) 96%, white);
      display: grid;
      gap: 14px;
      border-top-width: 4px;
    }
    .tier-block[data-tier="main"] { border-top-color: var(--tier-main); }
    .tier-block[data-tier="season"] { border-top-color: var(--tier-season); }
    .tier-block[data-tier="accent"] { border-top-color: var(--tier-accent); }
    .tier-title {
      font-family: var(--font-display);
      font-size: 22px;
      letter-spacing: -0.012em;
      line-height: 1.05;
    }
    .tier-desc { font-size: 14px; color: var(--muted); }
    .tier-chips {
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
    }
    .tier-chip {
      width: 36px;
      height: 36px;
      border-radius: 4px;
      border: 1px solid rgba(0, 0, 0, 0.08);
      box-shadow: 0 2px 6px var(--shadow);
    }

    /* ---- Per-color detail spread ------------------------------------- */
    .color-detail {
      display: grid;
      grid-template-columns: minmax(280px, 0.9fr) 1.1fr;
      grid-template-areas:
        "head head"
        "swatch codes"
        "swatch fabric"
        "swatch rules";
      gap: 24px clamp(24px, 4vw, 56px);
      padding: clamp(48px, 7vw, 96px) 0;
    }
    .color-detail .color-head {
      grid-area: head;
      display: flex;
      align-items: baseline;
      gap: 24px;
      padding-bottom: 18px;
      border-bottom: 1px solid var(--line);
    }
    .color-detail .color-swatch-large {
      grid-area: swatch;
      align-self: start;
      width: 100%;
      aspect-ratio: 1 / 1;
      border-radius: var(--radius);
      box-shadow: 0 22px 60px var(--shadow);
      border: 1px solid rgba(0, 0, 0, 0.08);
      max-height: 460px;
    }
    .color-detail .color-meta { flex: 1; display: grid; gap: 6px; }
    .color-detail .color-tagline { color: var(--ink-soft); font-size: 18px; max-width: 40ch; }
    .color-detail .color-codes { grid-area: codes; }
    .color-detail .color-fabric { grid-area: fabric; }
    .color-detail .color-rules { grid-area: rules; }

    .code-table {
      width: 100%;
      border-collapse: collapse;
      font-family: var(--font-mono);
      font-size: 13px;
    }
    .code-table th, .code-table td {
      padding: 10px 14px;
      text-align: left;
      border-bottom: 1px solid var(--line-soft);
    }
    .code-table th {
      width: 130px;
      color: var(--muted);
      font-weight: normal;
      letter-spacing: 0.08em;
      font-size: 10px;
      text-transform: uppercase;
    }
    .code-table td { color: var(--ink); letter-spacing: 0.02em; }

    .fabric-list, .rule-list {
      list-style: none;
      padding: 0;
      margin: 0;
      display: grid;
      gap: 8px;
    }
    .fabric-list li {
      padding: 10px 14px;
      border: 1px solid var(--line-soft);
      border-radius: 4px;
      background: color-mix(in oklch, var(--paper) 95%, white);
      font-size: 14px;
      color: var(--ink-soft);
    }
    .rule-list li {
      display: flex;
      gap: 12px;
      align-items: flex-start;
      padding: 8px 0;
      font-size: 14px;
      color: var(--ink-soft);
    }
    .rule-tag {
      font-family: var(--font-mono);
      font-size: 9px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      padding: 2px 8px;
      border-radius: 3px;
      flex-shrink: 0;
      margin-top: 1px;
    }
    .rule-do { background: color-mix(in oklch, var(--tier-main) 12%, transparent); color: var(--tier-main); }
    .rule-dont { background: color-mix(in oklch, var(--tier-accent) 12%, transparent); color: var(--tier-accent); }

    .color-detail[data-tier="main"] .color-head { border-bottom-color: var(--tier-main); }
    .color-detail[data-tier="season"] .color-head { border-bottom-color: var(--tier-season); }
    .color-detail[data-tier="accent"] .color-head { border-bottom-color: var(--tier-accent); }

    /* ---- Category × color matrix ------------------------------------- */
    .matrix-wrap {
      overflow-x: auto;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--paper);
    }
    .matrix {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    .matrix th, .matrix td {
      padding: 10px 12px;
      text-align: center;
      border-bottom: 1px solid var(--line-soft);
      border-right: 1px solid var(--line-soft);
    }
    .matrix th { font-weight: normal; }
    .matrix tbody th {
      text-align: left;
      font-family: var(--font-display);
      font-size: 16px;
      color: var(--ink);
    }
    .matrix .matrix-corner {
      background: var(--paper-deep);
      text-align: left;
      font-family: var(--font-mono);
      font-size: 11px;
      letter-spacing: 0.10em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .matrix .matrix-color {
      vertical-align: bottom;
      padding: 14px 8px;
      background: var(--paper-deep);
    }
    .matrix-chip {
      display: block;
      width: 28px;
      height: 28px;
      border-radius: 3px;
      margin: 0 auto 6px;
      border: 1px solid rgba(0, 0, 0, 0.08);
    }
    .matrix .matrix-color .meta {
      display: block;
      font-size: 9px;
      letter-spacing: 0.06em;
    }
    .matrix .matrix-total { background: var(--paper-deep); font-family: var(--font-mono); font-size: 12px; }
    .matrix .matrix-totals th { background: var(--paper-deep); }
    .matrix .matrix-totals td { background: var(--paper-deep); font-family: var(--font-mono); font-size: 12px; }
    .matrix .matrix-totals td.matrix-grand { background: var(--ink); color: var(--paper); font-weight: bold; }
    .matrix-note {
      margin-top: 12px;
      font-size: 11px;
      letter-spacing: 0.06em;
    }

    /* ---- Colorway count table ---------------------------------------- */
    .count-table {
      width: 100%;
      border-collapse: collapse;
      background: var(--paper);
      border: 1px solid var(--line);
    }
    .count-table th, .count-table td {
      padding: 14px 16px;
      text-align: left;
      border-bottom: 1px solid var(--line-soft);
    }
    .count-table th {
      font-family: var(--font-mono);
      font-size: 11px;
      letter-spacing: 0.10em;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: normal;
      background: var(--paper-deep);
    }
    .count-table tbody td:first-child {
      font-family: var(--font-display);
      font-size: 17px;
    }
    .count-table tbody td:nth-child(2) {
      font-family: var(--font-mono);
      font-size: 14px;
    }

    /* ---- Pantone TCX vs TPG note ------------------------------------- */
    .pantone-note {
      display: grid;
      grid-template-columns: 0.85fr 1.15fr;
      gap: clamp(24px, 5vw, 64px);
      align-items: start;
    }
    .pantone-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }
    .pantone-card {
      padding: 22px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--paper);
      display: grid;
      gap: 12px;
    }
    .pantone-card p { color: var(--muted); font-size: 14px; line-height: 1.5; }
    .pantone-card strong { color: var(--ink); }

    /* ---- QC block ---------------------------------------------------- */
    .qc-block { display: grid; gap: 24px; }
    .qc-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
    }
    .qc-card {
      padding: 22px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--paper);
      display: grid;
      gap: 10px;
    }
    .qc-card p, .qc-list { color: var(--muted); font-size: 14px; line-height: 1.5; }
    .qc-list { list-style: none; padding: 0; margin: 0; display: grid; gap: 6px; }
    .qc-list strong { color: var(--ink); }

    /* ---- Anti-palette ------------------------------------------------ */
    .anti-block {
      display: grid;
      grid-template-columns: 0.85fr 1.15fr;
      gap: clamp(24px, 5vw, 64px);
      align-items: start;
    }
    .anti-list {
      list-style: none;
      padding: 0;
      margin: 0;
      display: grid;
      gap: 10px;
      max-width: 60ch;
    }
    .anti-list li {
      padding: 14px 18px;
      border: 1px dashed var(--line);
      border-radius: var(--radius);
      color: var(--ink-soft);
      font-family: var(--font-mono);
      font-size: 13px;
      letter-spacing: 0.04em;
      background: color-mix(in oklch, var(--paper) 80%, white);
    }
    .anti-list li::before { content: "× "; color: var(--accent-loud); font-weight: 600; }

    /* ---- Carryover table --------------------------------------------- */
    .carryover-table {
      width: 100%;
      border-collapse: collapse;
      background: var(--paper);
      border: 1px solid var(--line);
    }
    .carryover-table th, .carryover-table td {
      padding: 14px 16px;
      text-align: left;
      border-bottom: 1px solid var(--line-soft);
      font-size: 14px;
    }
    .carryover-table th {
      font-family: var(--font-mono);
      font-size: 11px;
      letter-spacing: 0.10em;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: normal;
      background: var(--paper-deep);
    }
    .row-chip {
      display: inline-block;
      width: 18px;
      height: 18px;
      border-radius: 3px;
      vertical-align: middle;
      margin-right: 10px;
      border: 1px solid rgba(0, 0, 0, 0.08);
    }

    /* ---- Open questions ---------------------------------------------- */
    .open-questions {
      display: grid;
      grid-template-columns: 0.85fr 1.15fr;
      gap: clamp(24px, 5vw, 64px);
      align-items: start;
    }
    .next-list {
      list-style: none;
      padding: 0;
      margin: 0;
      display: grid;
      gap: 12px;
      max-width: 60ch;
    }
    .next-list li {
      display: grid;
      grid-template-columns: 110px 1fr;
      gap: 16px;
      padding: 14px 0;
      border-bottom: 1px solid var(--line-soft);
    }
    .next-when {
      font-family: var(--font-mono);
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .next-what {
      color: var(--ink-soft);
      font-size: 15px;
      line-height: 1.5;
    }

    /* ---- Responsive --------------------------------------------------- */
    @media (max-width: 1024px) {
      .master-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); }
      .qc-grid { grid-template-columns: 1fr 1fr; }
      .pantone-grid { grid-template-columns: 1fr; }
    }
    @media (max-width: 800px) {
      .cover-grid, .thesis-block, .pantone-note, .anti-block, .open-questions {
        grid-template-columns: 1fr;
      }
      .preview-strip { grid-template-columns: repeat(4, 1fr); }
      .master-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .tier-blocks { grid-template-columns: 1fr; }
      .qc-grid { grid-template-columns: 1fr; }
      .color-detail {
        grid-template-columns: 1fr;
        grid-template-areas:
          "head"
          "swatch"
          "codes"
          "fabric"
          "rules";
      }
      .color-detail .color-swatch-large { aspect-ratio: 5 / 3; max-height: 320px; }
      .color-detail .color-head { flex-direction: column; align-items: flex-start; gap: 10px; }
      .topline { flex-direction: column; align-items: flex-start; }
    }
    @media (max-width: 520px) {
      .master-grid { grid-template-columns: 1fr; }
    }

    /* ---- Print -------------------------------------------------------- */
    @media print {
      body { background: white; }
      .section { break-inside: avoid; padding: 24px 0; border-bottom: 1px solid #ccc; }
      .color-detail { break-before: page; }
      .matrix-wrap { overflow: visible; }
      .preview-strip { box-shadow: none; }
      .topline-status { color: black; }
    }
  </style>
</head>
<body>
  <div class="page-shell">
    <header class="topline" data-od-id="topline">
      <span>[REPLACE] Studio / Brand</span>
      <span>[REPLACE] Season — Color Story</span>
      <span class="topline-status">[REPLACE] v1 / draft / locked</span>
    </header>
    <main id="color-story">
      <!-- Paste sections from references/layouts.md here, in this order:
           1. cover
           2. thesis
           3. master grid (all colors at a glance)
           4. hierarchy + proportion bar + tier blocks
           5. per-color detail spreads (one per color)
           6. category × color matrix
           7. colorway count per style table
           8. TCX vs. TPG note
           9. dyeing QC + tolerance
           10. anti-palette
           11. carryover table
           12. open questions / next decisions
      -->
    </main>
  </div>
</body>
</html>
