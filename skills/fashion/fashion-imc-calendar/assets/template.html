<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>[REPLACE Season] IMC Calendar · [REPLACE Line]</title>
<style>
  @import url("https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css");
  @import url("https://fonts.googleapis.com/css2?family=Bagel+Fat+One&family=Black+Han+Sans&family=Diphylleia&family=Grandiflora+One&family=Hahmlet:wght@400;500;600;700&display=swap");
  :root {
    --ink:        #1f2933;
    --paper:      #fafaf7;
    --rule:       #e7e3da;
    --muted:      #6b7280;
    --accent:     #b8443a;

    --band-bag:   #d8e8d8;
    --band-cap:   #f5e6d3;
    --band-shoes: #d8d3e8;

    --font-sans: "Pretendard Variable", Pretendard, -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Noto Sans KR", "Segoe UI", system-ui, sans-serif;

    --font-display-report: "Paperlogy", "Wanted Sans Variable", "SUIT Variable", "Pretendard Variable", Pretendard, system-ui, sans-serif;

    --font-display-street: "Black Han Sans", "Gmarket Sans", "Pretendard Variable", Pretendard, sans-serif;

    --font-display-play: "Bagel Fat One", "Gmarket Sans", "Pretendard Variable", Pretendard, sans-serif;

    --font-display-romance: "Grandiflora One", "Diphylleia", "Hahmlet", "Noto Serif KR", "Source Serif 4", ui-serif, Georgia, serif;

    --font-display: var(--font-display-report);
    --font-text: var(--font-sans);
    --font-mono: "JetBrains Mono", "IBM Plex Mono", ui-monospace, "SF Mono", Menlo, monospace;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--paper); color: var(--ink); font-family: var(--font-text); }
  body { padding: 40px 40px 64px; }

  .ic-header { padding-bottom: 12px; margin-bottom: 24px; }
  .ic-meta { display: flex; gap: 16px; font-family: var(--font-mono); font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; }
  .ic-meta .date { margin-left: auto; }
  .title { font-family: var(--font-mono); font-size: 12px; letter-spacing: 0.15em; color: var(--muted); margin: 8px 0 0; text-transform: uppercase; }

  /* Bands */
  .band-block { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 16px; margin-bottom: 28px; }
  .band-card { padding: 14px; border-radius: 10px; display: flex; flex-direction: column; gap: 10px; }
  .band-card[data-band="bag"]   { background: var(--band-bag); }
  .band-card[data-band="cap"]   { background: var(--band-cap); }
  .band-card[data-band="shoes"] { background: var(--band-shoes); }
  .band-card[data-band="top"]   { background: var(--band-cap); }
  .band-card[data-band="outer"] { background: var(--band-bag); }
  .band-kpi { display: flex; flex-direction: column; gap: 4px; }
  .band-key { font-family: var(--font-display); font-size: 11px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); }
  .band-headline { font-family: var(--font-display); font-size: 14px; line-height: 1.4; color: var(--accent); font-weight: 600; }
  .band-chip .chip { display: inline-block; padding: 6px 12px; background: rgba(0,0,0,0.05); border-radius: 999px; font-family: var(--font-mono); font-size: 10px; text-transform: uppercase; letter-spacing: 0.06em; }
  .band-tactics { margin: 0; padding-left: 18px; font-size: 12px; line-height: 1.55; }

  /* Month track */
  .month-track { padding: 14px; background: rgba(255,255,255,0.5); border: 1px solid var(--rule); border-radius: 10px; margin-bottom: 24px; }
  .month-axis { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; padding-bottom: 8px; border-bottom: 1px solid var(--rule); margin-bottom: 12px; font-family: var(--font-mono); font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; }
  .hero-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 12px; }
  .hero-tile { background: rgba(255,255,255,0.7); border-radius: 6px; padding: 8px; display: flex; flex-direction: column; gap: 6px; }
  .hero-tile .image-frame { aspect-ratio: 4/3; background: #efeae0; border-radius: 4px; overflow: hidden; }
  .hero-tile .image-frame img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .hero-name { font-family: var(--font-display); font-size: 12px; margin: 0; }
  .hero-tag { font-family: var(--font-mono); font-size: 10px; padding: 3px 8px; background: rgba(0,0,0,0.05); border-radius: 999px; color: var(--muted); align-self: flex-start; text-transform: uppercase; letter-spacing: 0.06em; }

  .image-frame[data-fallback]:not(:has(img[src]:not([src=""])))::after { content: attr(data-fallback); display: block; padding: 6px; font-size: 9px; line-height: 1.3; color: var(--muted); font-family: var(--font-mono); text-align: center; }

  /* Rollout banner */
  .rollout-banner { padding: 14px 18px; background: var(--ink); color: #fff; border-radius: 6px; margin-bottom: 24px; }
  .rollout-banner h2 { font-family: var(--font-display); font-size: 14px; margin: 0; font-weight: 600; }

  /* Matrix (rhythm B) */
  .matrix-block table { width: 100%; border-collapse: separate; border-spacing: 4px; font-size: 11px; }
  .matrix-block th, .matrix-block td { padding: 8px; background: rgba(255,255,255,0.6); border-radius: 4px; text-align: center; vertical-align: top; min-height: 60px; }
  .matrix-block thead th { background: var(--ink); color: #fff; font-family: var(--font-mono); text-transform: uppercase; letter-spacing: 0.06em; }
  .matrix-block tbody th { background: var(--rule); font-family: var(--font-display); text-align: left; }

  /* Rail (rhythm C) */
  .ic-grid--rail-and-timeline { display: grid; grid-template-columns: 1fr 2fr; gap: 16px; }
  .band-rail { display: flex; flex-direction: column; gap: 12px; }
  .band-card--rail { padding: 10px; }
  .month-track--right { margin-bottom: 0; }

  /* Tail */
  .open-decisions { margin-top: 32px; padding-top: 20px; border-top: 1px solid var(--rule); }
  .open-decisions h2 { font-family: var(--font-display); font-size: 14px; margin: 0 0 12px; letter-spacing: 0.08em; text-transform: uppercase; }
  ul { margin: 0; padding-left: 18px; font-size: 13px; line-height: 1.6; }

  @media print { body { padding: 16px; } .band-card, .hero-tile { break-inside: avoid; } }
</style>
</head>
<body>
  <main id="imc-calendar">
    <!-- PASTE one rhythm + tail blocks from references/layouts.md. -->
  </main>
</body>
</html>
