<!doctype html>
<!--
  fashion-graphic-direction template
  Copy to <project>/index.html, replace [REPLACE] tokens, bind active
  DESIGN.md tokens into :root, paste a rhythm + tail blocks from
  references/layouts.md into <main id="graphic-direction">.
-->
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>[REPLACE Season] Graphic Direction · [REPLACE Brand]</title>
<style>
  @import url("https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css");
  @import url("https://fonts.googleapis.com/css2?family=Bagel+Fat+One&family=Black+Han+Sans&family=Diphylleia&family=Grandiflora+One&family=Hahmlet:wght@400;500;600;700&display=swap");
  :root {
    --ink:        #1f2933;
    --paper:      #fafaf7;
    --rule:       #e7e3da;
    --muted:      #6b7280;
    --accent:     #b8443a;
    --tag-bg:     rgba(0,0,0,0.05);

    --font-sans: "Pretendard Variable", Pretendard, -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Noto Sans KR", "Segoe UI", system-ui, sans-serif;

    --font-display-report: "Paperlogy", "Wanted Sans Variable", "SUIT Variable", "Pretendard Variable", Pretendard, system-ui, sans-serif;

    --font-display-street: "Black Han Sans", "Gmarket Sans", "Pretendard Variable", Pretendard, sans-serif;

    --font-display-play: "Bagel Fat One", "Gmarket Sans", "Pretendard Variable", Pretendard, sans-serif;

    --font-display-romance: "Grandiflora One", "Diphylleia", "Hahmlet", "Noto Serif KR", "Source Serif 4", ui-serif, Georgia, serif;

    --font-display: var(--font-display-report);
    --font-text: var(--font-sans);
    --font-mono: "JetBrains Mono", "IBM Plex Mono", ui-monospace, "SF Mono", Menlo, monospace;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--paper); color: var(--ink); font-family: var(--font-text); }
  body { padding: 40px 40px 64px; }

  .gd-header { border-bottom: 1px solid var(--rule); padding-bottom: 20px; margin-bottom: 32px; }
  .gd-meta { display: flex; gap: 16px; font-family: var(--font-mono); font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }
  .gd-meta .date { margin-left: auto; }
  .thesis { font-family: var(--font-display); font-size: 32px; line-height: 1.15; margin: 12px 0 8px; max-width: 60ch; }
  .thesis-body { font-size: 14px; line-height: 1.55; color: #374151; max-width: 80ch; margin: 0; }

  /* Theme stack (rhythm A) */
  .theme-stack { display: flex; flex-direction: column; gap: 32px; }
  .theme-card { padding: 20px; border: 1px solid var(--rule); border-radius: 8px; background: rgba(255,255,255,0.4); }
  .theme-header { display: flex; flex-wrap: wrap; gap: 12px; align-items: baseline; padding-bottom: 12px; margin-bottom: 16px; border-bottom: 1px solid var(--rule); }
  .theme-name { font-family: var(--font-display); font-size: 22px; margin: 0; }
  .theme-thesis { font-size: 13px; line-height: 1.5; color: #374151; margin: 0; flex: 1 1 50%; }
  .surface-tags { list-style: none; display: flex; flex-wrap: wrap; gap: 6px; margin: 0; padding: 0; }
  .surface-tags .tag { font-family: var(--font-mono); font-size: 10px; text-transform: uppercase; letter-spacing: 0.06em; padding: 3px 8px; border-radius: 999px; background: var(--tag-bg); color: var(--ink); }
  .theme-meta { width: 100%; display: flex; gap: 16px; font-family: var(--font-mono); font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.04em; }

  .theme-cluster { display: grid; grid-template-columns: repeat(6, 1fr); gap: 8px; }
  .theme-cluster--quad { grid-template-columns: repeat(4, 1fr); }
  .theme-tile { margin: 0; display: flex; flex-direction: column; gap: 4px; }
  .theme-tile .image-frame { aspect-ratio: 1/1; background: #efeae0; border-radius: 4px; overflow: hidden; display: flex; align-items: center; justify-content: center; }
  .theme-tile .image-frame img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .theme-tile figcaption { font-size: 10px; line-height: 1.3; color: var(--muted); }

  /* Theme grid (rhythm B) */
  .theme-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
  .theme-card--compact .theme-cluster { grid-template-columns: repeat(4, 1fr); }

  /* Symbol & Wordmark */
  .symbol-wordmark { margin-top: 36px; padding-top: 24px; border-top: 1px solid var(--rule); }
  .symbol-wordmark h2 { font-family: var(--font-display); font-size: 20px; margin: 0 0 4px; }
  .symbol-wordmark > p { font-size: 13px; color: #374151; margin: 0 0 16px; }
  .sw-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; }
  .sw-cluster h3 { font-family: var(--font-mono); font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); margin: 0 0 8px; }
  .sw-tiles { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }
  .sw-tiles figure { margin: 0; }
  .sw-tiles .image-frame { aspect-ratio: 1/1; background: #efeae0; border-radius: 4px; overflow: hidden; }
  .sw-tiles .image-frame img { width: 100%; height: 100%; object-fit: cover; display: block; }

  /* Fallback for any image-frame without a real img */
  .image-frame[data-fallback]:not(:has(img[src]:not([src=""])))::after { content: attr(data-fallback); display: block; padding: 6px; font-size: 9px; line-height: 1.3; color: var(--muted); font-family: var(--font-mono); text-align: center; }

  /* Tail blocks */
  .surface-matrix, .anti-direction, .open-decisions { margin-top: 40px; padding-top: 24px; border-top: 1px solid var(--rule); }
  .surface-matrix h2, .anti-direction h2, .open-decisions h2 { font-family: var(--font-display); font-size: 16px; margin: 0 0 12px; letter-spacing: 0.08em; text-transform: uppercase; }
  table { border-collapse: collapse; font-size: 12px; }
  th, td { padding: 6px 12px; text-align: center; border-bottom: 1px solid var(--rule); }
  th:first-child, td:first-child { text-align: left; }
  th { font-family: var(--font-mono); font-size: 11px; text-transform: uppercase; color: var(--muted); }
  ul { margin: 0; padding-left: 18px; font-size: 13px; line-height: 1.6; }

  @media (max-width: 900px) {
    .theme-grid, .sw-grid { grid-template-columns: 1fr; }
    .theme-cluster, .theme-cluster--quad { grid-template-columns: repeat(3, 1fr); }
  }
  @media print { body { padding: 24px; } .theme-card, .sw-cluster { break-inside: avoid; } }
</style>
</head>
<body>
  <main id="graphic-direction">
    <!-- PASTE one rhythm + (optional symbol-wordmark) + tail blocks. -->
  </main>
</body>
</html>
